name: Rebuild public site

# When site data or source changes (including saves from the GitHub-hosted
# admin), rebuild the static docs/ folder that GitHub Pages serves.
on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'public/**'
      - 'tools/build-pages.js'
  workflow_dispatch:

# Least privilege: read-only by default, the one job that needs to push the
# rebuilt docs/ elevates to contents:write locally.
permissions:
  contents: read

concurrency:
  group: build-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Third-party actions pinned to a commit SHA (supply-chain hardening);
      # Dependabot (.github/dependabot.yml) keeps these current.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Rebuild docs/
        run: node tools/build-pages.js

      - name: Commit docs/ if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs)" ]; then
            git add docs
            git commit -m "Rebuild public site [skip ci]"
            git push
          else
            echo "docs/ already up to date"
          fi
